spring.application.name=firstapi
spring.datasource.url=jdbc:postgresql://localhost:5433/todo-db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
springdoc.swagger-ui.path=/api/docs
app.security.jwt.secret=${JWT_SECRET:firstapi-local-development-secret-change-me}
app.security.jwt.access-token-ttl-seconds=${ACCESS_TOKEN_TTL_SECONDS:28800}
app.security.jwt.refresh-token-ttl-seconds=${REFRESH_TOKEN_TTL_SECONDS:2592000}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.firstapi.application.events
spring.kafka.consumer.auto-offset-reset=earliest
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
